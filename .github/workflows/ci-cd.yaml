name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - '.github/workflows/**'

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./app
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/multi-tenant-app:${{ github.sha }}
          ${{ secrets.DOCKER_USERNAME }}/multi-tenant-app:latest
    
    - name: Update Kubernetes manifest
      run: |
        sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/multi-tenant-app:${{ github.sha }}|" kubernetes/deployments/app-acme-corp-deployment.yaml
        sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/multi-tenant-app:${{ github.sha }}|" kubernetes/deployments/app-beta-corp-deployment.yaml
    
    - name: Commit updated manifests
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add kubernetes/deployments/
        git diff --quiet && git diff --staged --quiet || git commit -m "Update image to ${{ github.sha }}"
        git push
