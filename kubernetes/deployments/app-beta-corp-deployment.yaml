apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-beta-corp
  namespace: tenant-beta-corp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-beta-corp
  template:
    metadata:
      labels:
        app: app-beta-corp
    spec:
      containers:
      - name: app
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: app-beta-corp
  namespace: tenant-beta-corp
spec:
  selector:
    app: app-beta-corp
  ports:
  - port: 80
    targetPort: 80
