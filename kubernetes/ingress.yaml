apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multi-tenant-ingress
  namespace: tenant-acme-corp
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: acme-corp.yourplatform.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-acme-corp
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multi-tenant-ingress
  namespace: tenant-beta-corp
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: beta-corp.yourplatform.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-beta-corp
                port:
                  number: 80

